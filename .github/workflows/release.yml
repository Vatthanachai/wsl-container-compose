name: Release

on:
  push:
    branches:
      - "release-*"
    tags:
      - "v*.*.*"

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

  release:
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore

      - name: Publish win-x64 executable
        run: >
          dotnet publish src/WslContainerCompose.Cli/WslContainerCompose.Cli.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:Version=${{ steps.version.outputs.version }}
          -p:PublishSingleFile=true
          --output ./artifacts/publish/win-x64

      - name: Zip win-x64 executable
        shell: pwsh
        run: >
          Compress-Archive
          -Path ./artifacts/publish/win-x64/*
          -DestinationPath ./artifacts/wsl-compose-${{ steps.version.outputs.version }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ./artifacts/*.zip
