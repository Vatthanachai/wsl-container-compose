name: Release

on:
  push:
    branches:
      - "release-*"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test --configuration Release --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@v5
        with:
          reports: ./coverage/**/coverage.cobertura.xml
          targetdir: ./coverage/report
          reporttypes: MarkdownSummaryGithub;Html

      - name: Add coverage to job summary
        shell: pwsh
        run: Get-Content ./coverage/report/SummaryGithub.md >> $env:GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ./coverage/report

  release:
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore

      - name: Publish win-x64 executable
        run: >
          dotnet publish src/WslContainerCompose.Cli/WslContainerCompose.Cli.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:Version=${{ steps.version.outputs.version }}
          -p:PublishSingleFile=true
          --output ./artifacts/publish/win-x64

      - name: Zip win-x64 executable
        shell: pwsh
        run: >
          Compress-Archive
          -Path ./artifacts/publish/win-x64/*
          -DestinationPath ./artifacts/wsl-compose-${{ steps.version.outputs.version }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ./artifacts/*.zip
